{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Toko Lumine{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF7F2;
      --blush: #F2C4C4;
      --sage: #C4D4C4;
      --lavender: #D4C4F2;
      --sky: #C4DCF2;
      --peach: #F2D4C4;
      --mauve: #C4B4C4;
      --ink: #2A2520;
      --ink-light: #5A524A;
      --ink-faint: #9A928A;
      --white: #FFFFFF;
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #F2C4C480 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      left: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #D4C4F280 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 247, 242, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(42, 37, 32, 0.08);
      padding: 0 5%;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-logo span {
      color: var(--blush);
      filter: brightness(0.8);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink-light);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--blush);
      filter: brightness(0.8);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .nav-links a:hover { color: var(--ink); }
    .nav-links a:hover::after { width: 100%; }

    .nav-links a.active {
      color: var(--ink);
    }

    .nav-links a.active::after {
      width: 100%;
    }

    /* MAIN CONTENT */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 5% 100px;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 48px;
    }

    .page-header .eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .page-header h1 em {
      font-style: italic;
      color: var(--ink-light);
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      background: var(--ink);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 32px;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    footer strong {
      color: rgba(255,255,255,0.85);
    }

    /* BADGE */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* BUTTON */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.25s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--white);
    }

    .btn-primary:hover {
      background: #3D3530;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(42,37,32,0.2);
    }

    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid rgba(42,37,32,0.2);
    }

    .btn-outline:hover {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(42,37,32,0.12);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    /* DIVIDER */
    .divider {
      width: 48px;
      height: 3px;
      background: var(--blush);
      filter: brightness(0.85);
      border-radius: 3px;
      margin: 20px 0;
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">Lumine<span>.</span></a>
      <ul class="nav-links">
        <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="/produk/" {% if '/produk/' in request.path %}class="active"{% endif %}>Produk</a></li>
        <li><a href="/kontak/" {% if request.path == '/kontak/' %}class="active"{% endif %}>Kontak</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2026 <strong>Lumine Store</strong> Hak Cipta Dilindungi</p>
  </footer>
</body>
</html>
